<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>

        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }

        /* Login box */

        .login {
            background: #1e293b;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
            transition: opacity 0.6s;
        }

        input {
            padding: 10px;
            margin: 10px;
            border-radius: 5px;
            border: none;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            background: #38bdf8;
            cursor: pointer;
        }

        button:hover {
            background: #0ea5e9;
        }

        #message {
            margin-top: 10px;
        }

        /* Lock icon */

        .lock {
            font-size: 60px;
            transition: transform 0.5s;
        }

        /* Unlock animation */

        .unlock {
            animation: openLock 0.8s forwards;
        }

        @keyframes openLock {
            0% {
                transform: rotate(0deg);
            }
            40% {
                transform: rotate(-20deg);
            }
            100% {
                transform: rotate(20deg);
            }
        }

        /* Hidden section */

        #secret {
            display: none;
            opacity: 0;
            transform: translateY(40px);
            transition: all 0.8s;
        }

        #secret.show {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

    </style>
</head>

<body>

<div class="login" id="loginBox">

    <!--    <div class="lock" id="lockIcon">🔒</div>-->
    <img src="images/cartoon-policeman-illustration-vector.jpg" alt="Login Image">

    <h2>Stop right there! If you want to unlock any further clues, you need to enter the correct password!</h2>

    <input type="password" id="passwordInput" placeholder="Password">
    <br>

    <button onclick="unlock()">Unlock</button>

    <p id="message"></p>

</div>

<div id="secret">
    <h1>Secret Area</h1>
    <p>You unlocked the hidden section!</p>

    <ul>
        <li>Private files</li>
        <li>Hidden tools</li>
        <li>Admin content</li>
    </ul>

</div>

<script>

    const correctHash = "046e5068c8ca7f6c7d854bc53bcc3008c1520f2e942b797a896ac5c288d30cf6";

    async function unlock() {

        const input = document.getElementById("passwordInput").value;
        const message = document.getElementById("message");

        const hashed = await hashPassword(input);
        console.log(input);
        console.log(hashed)
        if (hashed === correctHash) {

            message.style.color = "lightgreen";
            message.textContent = "Unlocking...";

            setTimeout(() => {

                document.getElementById("loginBox").style.opacity = "0";

            }, 600);

            setTimeout(() => {

                document.getElementById("loginBox").style.display = "none";
                const secret = document.getElementById("secret");
                secret.classList.add("show");

            }, 1200);

        } else {

            message.style.color = "salmon";
            message.textContent = "Wrong password, try again!!";

        }

    }

    async function hashPassword(password) {
        const encoder = new TextEncoder();
        const data = encoder.encode(password);

        const hashBuffer = await crypto.subtle.digest("SHA-256", data);

        const hashArray = Array.from(new Uint8Array(hashBuffer));

        const hashHex = hashArray.map(b => b.toString(16).padStart(2, "0")).join("");

        return hashHex;
    }

</script>

</body>
</html>
