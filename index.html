<!DOCTYPE html>
<html>
<head>
    <title>Secure Login</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg,#4facfe,#00f2fe);
            height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
        }

        .login-box{
            background:white;
            padding:40px;
            border-radius:10px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
            text-align:center;
            width:300px;
        }

        input{
            width:100%;
            padding:10px;
            margin:10px 0;
            border-radius:6px;
            border:1px solid #ccc;
        }

        button{
            width:100%;
            padding:10px;
            border:none;
            border-radius:6px;
            background:#4facfe;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#2d8df0;
        }

        #message{
            margin-top:10px;
            font-weight:bold;
        }
    </style>

</head>
<body>

<div class="login-box">
    <h2>Please enter the password to proceed!</h2>

    <input type="password" id="password" placeholder="Enter password">

    <button onclick="checkPassword()">Login</button>

    <p id="message"></p>

</div>

<script>

    // SHA256 hash of password: "mypassword123"
    const correctHash = "6e659deaa85842cdabb5c6305fcc40033ba43772ec00d45c2a3c921741a5e377";

    async function checkPassword(){

        const input = document.getElementById("password").value;
        const message = document.getElementById("message");

        const hashed = await hashPassword(input);

        if(hashed === correctHash){

            message.style.color="green";
            message.textContent="Access granted! Redirecting...";

            setTimeout(()=>{
                window.location.href = "welcome.html";
            },1000);

        }else{

            message.style.color="red";
            message.textContent="Incorrect password";

        }

    }

</script>

</body>
</html>
